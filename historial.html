<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Historial - Ferro Mecánica</title>
    <style>
        :root { --naranja: #E48A06; --oscuro: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; color: var(--oscuro); margin: 0; padding: 20px; }
        .login-box { max-width: 400px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--naranja); }
        h2 { color: var(--naranja); text-align: center; margin-top: 0; text-transform: uppercase; font-size: 22px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--naranja); border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #c67705; }
        
        #resultado { max-width: 800px; margin: 20px auto; display: none; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
        .fecha { color: var(--naranja); font-weight: bold; font-size: 14px; margin-bottom: 8px; }
        .btn-pdf { display: inline-block; margin-top: 15px; padding: 10px 20px; background: white; text-decoration: none; color: var(--naranja); border-radius: 6px; font-size: 13px; font-weight: bold; border: 2px solid var(--naranja); transition: 0.3s; }
        .btn-pdf:hover { background: var(--naranja); color: white; }
        
        .loading { text-align: center; display: none; margin: 50px auto; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--naranja); animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #error-msg { color: #d93025; background: #fce8e6; padding: 10px; border-radius: 6px; font-size: 13px; text-align: center; margin-top: 15px; display: none; border: 1px solid #f1b0b7; }
    </style>
</head>
<body>

    <div class="login-box" id="auth-box">
        <h2>Mi Historial Técnico</h2>
        <p style="text-align: center; font-size: 13px; color: #666; margin-bottom: 20px;">Consultá los servicios realizados a tu vehículo.</p>
        
        <label>Email</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
        
        <label>Patente</label>
        <input type="text" id="patente" placeholder="ABC123" required>
        
        <button onclick="consultarHistorial()">INGRESAR AL PORTAL</button>
        <div id="error-msg"></div>
    </div>

    <div class="loading" id="loader">
        <div class="spinner"></div>
        <p style="color: var(--naranja); font-weight: bold; margin-top: 10px;">Buscando registros...</p>
    </div>

    <div id="resultado">
        <div class="card" style="border-left: 6px solid var(--naranja); background: #fdfdfd;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 id="nombre-cliente" style="margin: 0; text-transform: uppercase;"></h3>
                    <p id="datos-auto" style="margin: 5px 0 0 0; color: #666; font-weight: bold;"></p>
                </div>
                <button onclick="location.reload()" style="width: auto; padding: 5px 10px; font-size: 12px; background: #666;">SALIR</button>
            </div>
        </div>
        <div id="lista-ot"></div>
    </div>

    <script>
        // URL de tu nueva Web App (Standalone)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJdvYN-q2_p0mkqQnwx2at9AX-qYippQvASmDwluDOs3j3do76eHjA8zztBwPbZBc/exec";

        async function consultarHistorial() {
            const emailInput = document.getElementById('email').value.trim();
            const patenteInput = document.getElementById('patente').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const loader = document.getElementById('loader');
            const authBox = document.getElementById('auth-box');

            if (!emailInput || !patenteInput) {
                errorMsg.innerText = "Completá email y patente para ingresar.";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = "none";
            loader.style.display = "block";
            authBox.style.display = "none";

            try {
                const response = await fetch(`${WEB_APP_URL}?email=${encodeURIComponent(emailInput)}&patente=${encodeURIComponent(patenteInput)}`);
                const data = await response.json();

                loader.style.display = "none";

                if (data.error) {
                    errorMsg.innerText = data.error;
                    errorMsg.style.display = "block";
                    authBox.style.display = "block";
                } else {
                    document.getElementById('nombre-cliente').innerText = data.cliente;
                    document.getElementById('datos-auto').innerText = data.vehiculo;
                    
                    let htmlHistorial = "";
                    if (data.historial.length === 0) {
                        htmlHistorial = '<div class="card">No se encontraron órdenes de trabajo cerradas para este vehículo.</div>';
                    } else {
                        data.historial.forEach(ot => {
                            htmlHistorial += `
                                <div class="card">
                                    <div class="fecha">SERVICIO DEL ${ot.fecha}</div>
                                    <div style="font-size: 15px; line-height: 1.4;">${ot.detalle}</div>
                                    <div style="margin-top: 10px; font-size: 13px; color: #555;">
                                        <b>Kilometraje:</b> ${ot.km} KM<br>
                                        <b>Próximo Service:</b> ${ot.proximo} KM
                                    </div>
                                    ${ot.pdf ? `<a href="${ot.pdf}" target="_blank" class="btn-pdf">DESCARGAR REPORTE PDF</a>` : ''}
                                </div>
                            `;
                        });
                    }

                    document.getElementById('lista-ot').innerHTML = htmlHistorial;
                    document.getElementById('resultado').style.display = "block";
                }
            } catch (err) {
                loader.style.display = "none";
                authBox.style.display = "block";
                errorMsg.innerText = "Error de conexión. Verificá tu internet o intentá más tarde.";
                errorMsg.style.display = "block";
                console.error(err);
            }
        }
    </script>
</body>
</html>
